name: CI
on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: sicnpcf
          POSTGRES_USER: sicnpcf
          POSTGRES_PASSWORD: sicnpcf
        ports: ['5432:5432']
        options: --health-cmd="pg_isready" --health-interval=5s --health-timeout=3s --health-retries=5
    env:
      DJANGO_SECRET_KEY: ci-only
      DJANGO_DEBUG: "1"
      DB_HOST: localhost
      DB_USER: sicnpcf
      DB_PASSWORD: sicnpcf
      AUDIT_HASH_SECRET: ci-only-audit-hash-secret-not-for-production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements/dev.txt
      - run: pip install -r requirements/dev.txt
      - name: Ruff
        run: ruff check .
      - name: Mypy
        run: mypy apps/ --ignore-missing-imports
      - name: Pytest
        run: pytest
